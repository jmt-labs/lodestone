version: 2

project_name: lodestone

before:
  hooks:
    - go mod tidy

builds:
  - id: lodestone
    main: ./cmd/lodestone
    binary: lodestone
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - id: lodestone
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: "^.*feat[(\\w]*.*"
      order: 0
    - title: Bug fixes
      regexp: "^.*fix[(\\w]*.*"
      order: 1
    - title: Other
      order: 999

# Homebrew-Tap und nfpms (apt/.deb) werden aktiviert, sobald die
# entsprechenden Tap- und Repository-Konfigs in der Org bereitstehen.
# Bewusst nicht im initialen Bootstrap, damit `goreleaser check` ohne
# Secrets/Token grün läuft.
