name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          check-latest: true
      - run: go vet ./...
      - run: go test -race -count=1 ./...

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          check-latest: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  vuln:
    name: vuln
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          check-latest: true
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck (only if e2e scripts exist)
        run: |
          if compgen -G "e2e/*.sh" > /dev/null; then
            sudo apt-get update -qq && sudo apt-get install -y shellcheck
            shellcheck e2e/*.sh
          else
            echo "no e2e/*.sh yet — skipping"
          fi

  readme-coverage:
    name: readme-coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify Phase-1 subcommands are documented in README
        run: |
          missing=0
          for verb in ingest fingerprint score signals; do
            if ! grep -q "lodestone $verb" README.md; then
              echo "::error::README missing reference to 'lodestone $verb'"
              missing=1
            fi
          done
          exit $missing
